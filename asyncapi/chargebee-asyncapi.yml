          - $ref: '#/components/messages/SubscriptionCancelled'
          - $ref: '#/components/messages/SubscriptionChanged'
          - $ref: '#/components/messages/SubscriptionChangedWithBackdating'
          - $ref: '#/components/messages/SubscriptionChangesScheduled'
